<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:320px;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#1a1916;font-size:14px}
  .header{background:#2d5a3d;padding:14px 16px;display:flex;align-items:center;gap:10px}
  .logo{font-family:Georgia,serif;font-size:18px;color:#fff}
  .logo-tag{font-size:9px;font-weight:700;letter-spacing:2px;color:#7fc29a;text-transform:uppercase;margin-left:4px}
  .header-right{margin-left:auto;font-size:11px;color:#7fc29a}
  .body{padding:16px}
  .status{background:#f7f6f2;border:1px solid #e8e7e0;border-radius:10px;padding:12px 14px;margin-bottom:14px}
  .status-title{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#9c9b94;margin-bottom:4px}
  .status-val{font-size:13px;color:#1a1916;line-height:1.5}
  .status-val.detected{color:#2d5a3d;font-weight:500}
  .status-val.none{color:#9c9b94}
  .btn{width:100%;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
  .btn-primary{background:#2d5a3d;color:#fff}
  .btn-primary:hover{background:#246332}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .btn-secondary{background:#f7f6f2;color:#6b6960;border:1px solid #e8e7e0}
  .btn-secondary:hover{background:#f0efe9}
  .auth-section{text-align:center;padding:20px 0}
  .auth-title{font-family:Georgia,serif;font-size:20px;margin-bottom:6px}
  .auth-sub{font-size:12px;color:#6b6960;margin-bottom:16px;line-height:1.6}
  .input{width:100%;background:#f7f6f2;border:1px solid #e8e7e0;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;color:#1a1916}
  .input:focus{border-color:rgba(45,90,61,.4)}
  .err{font-size:12px;color:#b84040;margin-bottom:8px;text-align:center}
  .success{font-size:12px;color:#2d5a3d;margin-bottom:8px;text-align:center}
  .divider{display:flex;align-items:center;gap:8px;margin:10px 0}
  .divider hr{flex:1;border:none;border-top:1px solid #e8e7e0}
  .divider span{font-size:11px;color:#9c9b94}
  .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tag{display:inline-block;background:#e8f0eb;color:#2d5a3d;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;margin-top:4px}
  .footer{border-top:1px solid #e8e7e0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
  .footer a{font-size:11px;color:#9c9b94;text-decoration:none}
  .footer a:hover{color:#2d5a3d}
</style>
</head>
<body>
<div class="header">
  <span class="logo">Folio</span>
  <span class="logo-tag">CV Builder</span>
  <span class="header-right" id="user-email"></span>
</div>

<div id="auth-view" style="display:none" class="body">
  <div class="auth-section">
    <div class="auth-title">Sign in to Folio</div>
    <div class="auth-sub">Apply to any job with a tailored CV in one click.</div>
  </div>
  <input class="input" type="email" id="email" placeholder="you@email.com" autocomplete="email">
  <input class="input" type="password" id="password" placeholder="Password" autocomplete="current-password">
  <div class="err" id="auth-err" style="display:none"></div>
  <button class="btn btn-primary" id="signin-btn">Sign in</button>
  <div class="divider"><hr><span>or</span><hr></div>
  <button class="btn btn-secondary" id="open-signup">Create account on Folio →</button>
</div>

<div id="main-view" style="display:none" class="body">
  <div class="status" id="jd-status">
    <div class="status-title">Current page</div>
    <div class="status-val none" id="jd-title">Scanning for job description…</div>
  </div>
  <button class="btn btn-primary" id="apply-btn" disabled>
    <span id="apply-icon">◈</span>
    <span id="apply-text">Apply with Folio</span>
  </button>
  <button class="btn btn-secondary" id="open-folio-btn">Open Folio dashboard →</button>
</div>

<div class="footer">
  <a href="#" id="footer-link">folio.cv</a>
  <a href="#" id="signout-link" style="display:none">Sign out</a>
</div>

<script src="popup.js"></script>
</body>
</html>
